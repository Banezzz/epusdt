version: 2

project_name: ezpay

before:
  hooks:
    - go test ./...

builds:
  - id: ezpay
    main: .
    binary: ezpay
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/Banezzz/ezpay/config.BuildVersion={{ .Version }} -X github.com/Banezzz/ezpay/config.BuildCommit={{ .Commit }} -X github.com/Banezzz/ezpay/config.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: ezpay
    ids:
      - ezpay
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - .env.example
      - static/**
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "SHA256SUMS"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: Banezzz
    name: ezpay
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^fix\\(ci\\):"
      - "^build\\(release\\):"
      - "^Merge pull request"
